{% extends "base.html" %}
{% block title %}Withdraw Funds{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto py-12">

    <h2 class="text-3xl font-bold mb-6">Withdraw Funds</h2>

    <div class="bg-white shadow rounded-xl p-6 mb-6">
        <p class="text-lg">Available Balance:
            <span class="font-bold text-green-600">${{ profile.available_balance }}</span>
        </p>
        <p class="text-lg">Pending Balance:
            <span class="font-bold text-yellow-600">${{ profile.pending_balance }}</span>
        </p>
    </div>

    <form method="post" class="space-y-4 bg-white p-6 rounded-xl shadow">
        {% csrf_token %}

        <input type="number" step="0.01" name="amount" placeholder="Amount"
               class="w-full border rounded-lg px-4 py-3" required>

        <select name="method" class="w-full border rounded-lg px-4 py-3">
            <option value="easypaisa">Easypaisa</option>
            <option value="jazzcash">JazzCash</option>
            <option value="bank">Bank Transfer</option>
        </select>

        <input type="text" name="account" placeholder="Account Number"
               class="w-full border rounded-lg px-4 py-3" required>

        <button class="bg-black text-white px-6 py-3 rounded-lg w-full">
            Request Withdrawal
        </button>
    </form>

</div>
{% endblock %}
